name: HTB Progress

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Fetch HTB Data and Update README
        run: |
          python3 fetch_htb_data.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'Scrayil'
          git config --global user.email 'mattia.bennati@mailbox.org'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated HTB progress fetch" && git push)
